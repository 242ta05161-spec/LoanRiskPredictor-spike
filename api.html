<!DOCTYPE html>
<html>
<head>
    <title>AI Loan Risk Engine</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            margin: 50px auto;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 20px;
            background: #2a5298;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🤖 AI Loan Risk Engine</h1>

<div class="container">
    <input id="name" placeholder="Name"><br>
    <input id="age" type="number" placeholder="Age"><br>
    <input id="income" type="number" placeholder="Monthly Income"><br>
    <input id="seasonal" type="number" step="0.1" placeholder="Seasonal Variation"><br>
    <input id="credit" type="number" placeholder="Credit Score"><br>
    <input id="loans" type="number" placeholder="Existing Loans"><br>
    <input id="academic" type="number" placeholder="Academic Score"><br>
    <label><input type="checkbox" id="student"> Is Student</label><br><br>

    <button onclick="predict()">Check Loan</button>

    <div id="result"></div>
</div>

<script>
async function predict() {
    const data = {
        name: document.getElementById("name").value,
        age: parseInt(document.getElementById("age").value),
        monthly_income: parseFloat(document.getElementById("income").value),
        seasonal_income_variation: parseFloat(document.getElementById("seasonal").value),
        credit_score: parseInt(document.getElementById("credit").value),
        existing_loans: parseFloat(document.getElementById("loans").value),
        academic_score: parseFloat(document.getElementById("academic").value),
        is_student: document.getElementById("student").checked
    };

    const response = await fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerHTML =
        "Decision: " + result.decision +
        "<br>Risk Score: " + result.combined_score;
}
</script>

</body>
</html>
